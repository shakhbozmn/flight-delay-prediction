name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Hygiene tests
        run: |
          pytest tests/test_publication_hygiene.py -q || true
          pytest tests/test_publication_hygiene.py -q
      - name: Full test suite
        run: pytest -q
      - name: Validate artifact JSON
        run: |
          python -c "import json; json.load(open('models/model_metadata.json'))"
          python -c "import json; json.load(open('data/dashboard_metadata.json'))"
      - name: Validate notebook JSON
        run: |
          python -c "import json; json.load(open('notebooks/flight_delay_analysis.ipynb'))"
      - name: Model load smoke test
        run: |
          python -c "import joblib, pathlib; p = pathlib.Path('models/model_pipeline.joblib'); joblib.load(p)"
      - name: Streamlit app smoke test
        run: |
          pytest tests/test_app_smoke.py -q